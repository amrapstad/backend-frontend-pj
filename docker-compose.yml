services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgresdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./populate_sql.sql:/docker-entrypoint-initdb.d/populate_sql.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgresdb"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  backend:
    build: ./backend
    develop:
      watch:
        - action: rebuild
          path: ./backend
    restart: "unless-stopped"
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=postgresdb;Username=${DB_USER};Password=${DB_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
 
  frontend:
    build: ./frontend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
 
volumes:
  pgdata: